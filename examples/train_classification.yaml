mcs_version: "0.1.0"

name: "logreg_classification_baseline_v1"
task: "classification"

model_family: "linear"
model_id: "LogisticRegression"

hyperparams:
  penalty: "l2"
  C: 1.0
  solver: "lbfgs"
  max_iter: 2000
  class_weight: "balanced"
  random_state: 42

metrics:
  - "accuracy"
  - "f1"
  - "roc_auc"
  - "average_precision"

seed: 42

early_stopping: null

cross_validation:
  enabled: false
  folds: 5
  strategy: "stratified_kfold"
  group_field: null
  parameters: {}

calibration:
  enabled: true
  method: "temperature"
  parameters: {}

parameters:
  feature_space: "embedding"
  note: "Baseline linear classifier; calibration enabled for decision-ready probabilities."

input_split_fingerprint: null
input_embedding_fingerprint: null

output:
  model_path: "artifacts/models/logreg_classification_baseline_v1.joblib"
  metrics_path: "artifacts/metrics/logreg_classification_baseline_v1.json"
  predictions_path: "artifacts/predictions/logreg_classification_baseline_v1.parquet"
  checkpoint_dir: null
